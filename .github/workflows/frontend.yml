name: Frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - "e2e/**"
      - ".github/workflows/frontend.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "e2e/**"
      - ".github/workflows/frontend.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: e2e

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke suite
        run: npx playwright test
        env:
          WEB_BASE_URL: ${{ vars.WEB_BASE_URL || 'http://localhost:4200' }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'http://localhost:5001' }}
