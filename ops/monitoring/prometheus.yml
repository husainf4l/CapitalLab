global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    app: capitallab

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: capitallab-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080

  - job_name: capitallab-api-health
    metrics_path: /health/ready
    static_configs:
      - targets:
          - api:8080

  - job_name: capitallab-postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: capitallab-redis
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
