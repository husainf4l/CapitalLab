name: capitallab-staging

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: capitallab/api:staging
    restart: unless-stopped
    env_file:
      - .env.staging
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB};
        Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};
        Pooling=true;MinPoolSize=2;MaxPoolSize=50;
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false"
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__PrivateKeyBase64: ${JWT_PRIVATE_KEY_BASE64}
      Jwt__PublicKeyBase64: ${JWT_PUBLIC_KEY_BASE64}
      Encryption__Key: ${ENCRYPTION_KEY}
      Storage__LocalRootPath: /app/uploads
      Storage__BaseUrl: ${STORAGE_BASE_URL}
      Cors__AllowedOrigins__0: ${WEB_PUBLIC_URL}
      Cors__AllowedOrigins__1: https://app.capitallab.demo
      Pdf__StoragePath: /app/uploads/reports
      Email__SmtpHost: ${SMTP_HOST:-localhost}
      Email__Port: ${SMTP_PORT:-587}
      Email__Username: ${SMTP_USERNAME:-}
      Email__Password: ${SMTP_PASSWORD:-}
    volumes:
      - api-uploads:/app/uploads
      - api-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - capitallab-staging
    expose:
      - "8080"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: capitallab/web:staging
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - capitallab-staging
    expose:
      - "80"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./ops/postgres/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - capitallab-staging
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - capitallab-staging
    expose:
      - "6379"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ops/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - capitallab-staging

volumes:
  postgres-data:
  redis-data:
  api-uploads:
  api-logs:
  nginx-logs:

networks:
  capitallab-staging:
    driver: bridge
